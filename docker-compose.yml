# Данные панели (SQLite panel.db, каталог /data/backups) на хосте:
# задайте PANEL_DATA_HOST_PATH в .env, например /var/lib/proxy-admin-panel/data
# По умолчанию — ./data рядом с docker-compose.yml.
networks:
  proxy_internal:
    driver: bridge
    # Статический IP sing-box: 3proxy при чтении parent требует адрес, который getip46 принимает
    # (имя сервиса в части сборок/тайминга даёт «parent … failed with code 5»).
    ipam:
      config:
        - subnet: 10.210.99.0/24

services:
  backend:
    build:
      context: ./backend
    container_name: proxy_admin_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////data/panel.db
      PROXY_CONFIG_PATH: /opt/proxy/conf/3proxy.cfg
      PROXY_LOG_PATH: /opt/proxy/logs/traffic.log
      MTPROTO_CONFIG_PATH: /opt/mtproto/config.toml
      PANEL_SECRET_KEY: ${PANEL_SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      PROXY_PUBLIC_HOST: ${PROXY_PUBLIC_HOST:-auto}
      MTPROTO_PUBLIC_HOST: ${MTPROTO_PUBLIC_HOST:-}
      PROXY_PUBLIC_HTTP_PORT: ${HTTP_PROXY_PORT:-13128}
      PROXY_PUBLIC_SOCKS_PORT: ${SOCKS_PROXY_PORT:-11080}
      MTPROTO_PUBLIC_PORT: ${MTPROTO_PUBLIC_PORT:-2053}
      MTPROTO_INTERNAL_PORT: 3443
      MTPROTO_SECRET_MODE: ${MTPROTO_SECRET_MODE:-faketls}
      MTPROTO_STATS_URL: http://mtproto:9090/stats
      MTPROTO_FAKE_TLS_DOMAIN: ${MTPROTO_FAKE_TLS_DOMAIN:-yandex.ru}
      # Low-load mode: less frequent log records and DB updates.
      PROXY_LOGDUMP_BYTES: ${PROXY_LOGDUMP_BYTES:-65536}
      TRAFFIC_POLL_INTERVAL_SECONDS: ${TRAFFIC_POLL_INTERVAL_SECONDS:-2.0}
      TRAFFIC_SAMPLING_INTERVAL_SECONDS: ${TRAFFIC_SAMPLING_INTERVAL_SECONDS:-30}
      # Графики в UI — до 24 ч; семплы старше удаляются (см. maybe_prune_traffic_samples в backend).
      TRAFFIC_SAMPLES_RETENTION_HOURS: ${TRAFFIC_SAMPLES_RETENTION_HOURS:-48}
      TRAFFIC_SAMPLES_PRUNE_CHUNK: ${TRAFFIC_SAMPLES_PRUNE_CHUNK:-10000}
      TRAFFIC_SAMPLES_PRUNE_MAX_BATCHES: ${TRAFFIC_SAMPLES_PRUNE_MAX_BATCHES:-50}
      PRUNE_TRAFFIC_EVENTS_MAX_ROWS: ${PRUNE_TRAFFIC_EVENTS_MAX_ROWS:-500000}
      PRUNE_TRAFFIC_EVENTS_CHUNK: ${PRUNE_TRAFFIC_EVENTS_CHUNK:-100000}
      SINGBOX_CONFIG_PATH: /opt/sing-box/config.json
      # Должен совпадать с ipv4_address sing-box (3proxy parent не надёжен с DNS-именем при старте).
      SINGBOX_SOCKS_HOST: ${SINGBOX_SOCKS_HOST:-10.210.99.10}
      SINGBOX_SOCKS_PORT: "1080"
      SINGBOX_LOG_LEVEL: ${SINGBOX_LOG_LEVEL:-warn}
      VLESS_CHAIN_PROBE_TIMEOUT: ${VLESS_CHAIN_PROBE_TIMEOUT:-4}
      VLESS_CHAIN_PROBE_HOST: ${VLESS_CHAIN_PROBE_HOST:-1.1.1.1}
      VLESS_CHAIN_PROBE_PORT: ${VLESS_CHAIN_PROBE_PORT:-443}
    volumes:
      - ${PANEL_DATA_HOST_PATH:-./data}:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - proxy_conf:/opt/proxy/conf
      - proxy_logs:/opt/proxy/logs
      - mtproto_conf:/opt/mtproto
      - singbox_conf:/opt/sing-box
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 25s
    ports:
      - "${PANEL_PORT:-8000}:8000"
    networks:
      - proxy_internal
  sing-box:
    image: ghcr.io/sagernet/sing-box:v1.13.0
    container_name: proxy_sing_box
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - singbox_conf:/etc/sing-box
    command: ["run", "-c", "/etc/sing-box/config.json"]
    expose:
      - "1080"
    # Образ alpine + bash: проверка, что SOCKS слушает (иначе mtg/proxy ловят «no such host» для sing-box).
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 3 bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/1080' || exit 1",
        ]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 30s
    networks:
      proxy_internal:
        ipv4_address: 10.210.99.10
        aliases:
          - sing-box
          - proxy_sing_box
  proxy:
    image: 3proxy/3proxy:latest
    container_name: proxy_server
    restart: unless-stopped
    depends_on:
      sing-box:
        condition: service_healthy
    volumes:
      - proxy_conf:/etc/3proxy
      - proxy_logs:/var/log/3proxy
    ports:
      - "${HTTP_PROXY_PORT:-13128}:3128"
      - "${SOCKS_PROXY_PORT:-11080}:1080"
    networks:
      - proxy_internal

  mtproto:
    build:
      context: ./mtproto
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      sing-box:
        condition: service_healthy
    volumes:
      - mtproto_conf:/config
    command: ["run", "/config/config.toml"]
    expose:
      - "9090"
    ports:
      - "${MTPROTO_PUBLIC_PORT:-2053}:3443"
    networks:
      - proxy_internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["ssl"]
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - proxy_internal

volumes:
  proxy_conf:
  proxy_logs:
  mtproto_conf:
  singbox_conf:
  caddy_data:
  caddy_config:
